<div class="profile-container">
  <h2>User Profile</h2>
  
  <div class="profile-card">
    <div class="avatar">
      <span>👤</span>
    </div>
    
    <div class="profile-info">
      <div class="info-row">
        <label>Name:</label>
        <span>{{ userName }}</span>
      </div>
      
      <div class="info-row">
        <label>Email:</label>
        <span>{{ email }}</span>
      </div>
      
      <div class="info-row">
        <label>Joined:</label>
        <span>{{ joinedDate }}</span>
      </div>
    </div>
  </div>
</div>
